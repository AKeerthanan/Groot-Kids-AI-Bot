<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login — Groot AI 🌿</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Nunito',sans-serif}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(ellipse at 20% 80%, rgba(44,100,48,.5), transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(74,158,80,.2), transparent 50%),
    linear-gradient(160deg,#050e06,#0d2010 60%,#081408);
  color:#d4edd6;padding:20px;
}
.card{
  width:100%;max-width:420px;
  background:linear-gradient(145deg,rgba(20,41,22,0.97),rgba(10,26,13,0.97));
  border:1px solid rgba(74,158,80,0.3);
  border-radius:24px;padding:40px;
  box-shadow:0 30px 80px rgba(0,0,0,.7),0 0 60px rgba(74,158,80,0.1);
}
.logo-wrap{text-align:center;margin-bottom:20px}
.logo-wrap svg{width:80px;height:80px;filter:drop-shadow(0 0 18px rgba(111,207,116,0.6));animation:groot-idle 2s ease-in-out infinite alternate}
@keyframes groot-idle{0%{transform:rotate(-4deg)}100%{transform:rotate(4deg)}}
.logo{font-family:'Fredoka One',cursive;font-size:28px;text-align:center;margin-bottom:4px;
  background:linear-gradient(135deg,#6fcf74,#f5c842);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sub{text-align:center;color:#5a8a5e;margin-bottom:26px;font-size:13px}
label{display:block;font-weight:800;font-size:12px;margin:14px 0 5px;color:#5a8a5e;text-transform:uppercase;letter-spacing:.5px}
input{
  width:100%;padding:13px 16px;border-radius:12px;
  border:1px solid rgba(74,158,80,0.25);
  background:rgba(74,158,80,0.08);color:#d4edd6;font-size:15px;outline:none;
  font-family:'Nunito',sans-serif;transition:all .2s;
}
input:focus{border-color:rgba(111,207,116,0.5);box-shadow:0 0 0 3px rgba(74,158,80,0.12)}
input::placeholder{color:rgba(74,158,80,0.3)}
button{
  margin-top:22px;width:100%;padding:14px;border:none;border-radius:30px;
  background:linear-gradient(135deg,#4a9e50,#6fcf74);
  color:#0a1a0d;font-size:16px;font-weight:900;cursor:pointer;
  font-family:'Fredoka One',cursive;
  box-shadow:0 4px 18px rgba(74,158,80,0.4);transition:all .2s;
}
button:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(74,158,80,0.6)}
.error{
  color:#ff9988;font-size:13px;margin-top:12px;text-align:center;min-height:18px;
  background:rgba(232,93,74,0.1);border:1px solid rgba(232,93,74,0.2);
  border-radius:8px;padding:8px;display:none;
}
.hint{margin-top:18px;text-align:center;font-size:12px;color:#3d6a41}
.hint code{background:rgba(74,158,80,0.12);padding:2px 7px;border-radius:5px;color:#6fcf74}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <svg viewBox="0 0 80 90" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="40" cy="78" rx="18" ry="10" fill="#5a3a1a"/>
      <rect x="25" y="68" width="30" height="16" rx="5" fill="#6b4523"/>
      <ellipse cx="40" cy="68" rx="15" ry="4" fill="#3d2510"/>
      <path d="M30 72 Q23 76 20 82" stroke="#4a7a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M50 72 Q57 76 60 82" stroke="#4a7a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M30 68 Q28 56 30 46 Q32 40 40 38 Q48 40 50 46 Q52 56 50 68" fill="#5a8a45"/>
      <path d="M32 52 Q22 48 17 52" stroke="#5a8a45" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M48 52 Q58 48 63 52" stroke="#5a8a45" stroke-width="6" fill="none" stroke-linecap="round"/>
      <circle cx="16" cy="53" r="4" fill="#4a7a3a"/>
      <circle cx="64" cy="53" r="4" fill="#4a7a3a"/>
      <ellipse cx="40" cy="27" rx="16" ry="18" fill="#5a8a45"/>
      <ellipse cx="33" cy="27" rx="4" ry="5" fill="#1a0a00"/>
      <ellipse cx="47" cy="27" rx="4" ry="5" fill="#1a0a00"/>
      <circle cx="35" cy="25" r="1.5" fill="#fff" opacity="0.9"/>
      <circle cx="49" cy="25" r="1.5" fill="#fff" opacity="0.9"/>
      <ellipse cx="40" cy="33" rx="2.5" ry="1.5" fill="#3d6a30"/>
      <path d="M34 37 Q40 42 46 37" stroke="#3d6a30" stroke-width="2" fill="none" stroke-linecap="round"/>
      <ellipse cx="27" cy="12" rx="7" ry="4" fill="#6fcf74" transform="rotate(-35 27 12)"/>
      <ellipse cx="40" cy="8" rx="6" ry="3.5" fill="#5ab860"/>
      <ellipse cx="53" cy="11" rx="7" ry="4" fill="#7dd982" transform="rotate(30 53 11)"/>
      <circle cx="40" cy="4" r="3" fill="#f5c842"/>
      <circle cx="36" cy="3" r="2.5" fill="#f5c842"/>
      <circle cx="44" cy="3" r="2.5" fill="#f5c842"/>
      <circle cx="40" cy="4" r="2" fill="#e8a020"/>
    </svg>
  </div>
  <div class="logo">🛡️ Groot Admin</div>
  <p class="sub">Training dashboard — Groot AI</p>
  <label>Username</label>
  <input id="u" placeholder="admin" autocomplete="username"/>
  <label>Password</label>
  <input id="p" type="password" placeholder="••••••" autocomplete="current-password"/>
  <button onclick="go()">🌿 Enter the Forest</button>
  <div class="error" id="err"></div>
  <div class="hint">Default: <code>admin</code> / <code>admin123</code></div>
</div>
<script>
async function go(){
  const u=document.getElementById('u').value.trim();
  const p=document.getElementById('p').value;
  const err=document.getElementById('err');
  err.style.display='none';
  const r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
  const d=await r.json();
  if(d.success){location.reload();}
  else{err.textContent=d.error||'Wrong credentials!';err.style.display='block';}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')go()});
</script>
</body>
</html>
